name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze

  test:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  build-apks:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get

      - name: Build debug APKs (split by ABI)
        run: flutter build apk --debug --split-per-abi

      - name: Rename APKs
        run: |
          cd build/app/outputs/flutter-apk
          for f in *.apk; do
            mv "$f" "pixelvibe-${f}"
          done

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-apks-${{ github.sha }}
          path: build/app/outputs/flutter-apk/*.apk
