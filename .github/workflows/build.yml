name: build

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze

  kotlin-check:
    needs: analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: ./gradlew ktlintCheck lint
        working-directory: android

  test:
    needs: kotlin-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter test

  kotlin-test:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - run: ./gradlew test
        working-directory: android

  build-apks:
    needs: kotlin-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get

      - name: Build debug APKs (split by ABI)
        run: flutter build apk --debug --split-per-abi || true

      - name: Verify APKs exist
        run: ls -la build/app/outputs/flutter-apk/*.apk

      - name: Upload arm64-v8a APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-arm64-v8a-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - name: Upload armeabi-v7a APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-armeabi-v7a-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk

  reports:
    if: always()
    needs: build-apks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - name: Upload lint reports
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: |
            android/app/build/reports/lint-results-*.xml
      - name: Upload test reports
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            android/app/build/reports/tests/
