name: release-build
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'

      - uses: actions/cache@v5
        with:
          path: /home/runner/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test

      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore

      - name: Build release APKs
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-debug-symbols-${{ github.sha }}
          path: build/debug-info/

      - uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-arm64-v8a-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk

      - uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-armeabi-v7a-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk

      - name: Upload x86_64 release APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-x86_64-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-x86_64-release.apk
