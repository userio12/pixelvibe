name: release-build
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test
      - name: Decode keystore
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > ${{ github.workspace }}/release.keystore
      - name: Build release APKs
        run: flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
      - uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-arm64-v8a-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
          compression-level: 0
      - uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-armeabi-v7a-release-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
          compression-level: 0
      - name: Extract version
        id: version
        run: |
          echo "version=$(grep '^version: ' pubspec.yaml | sed 's/version: //' | sed 's/\+.*//')" >> $GITHUB_OUTPUT
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          files: |
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
