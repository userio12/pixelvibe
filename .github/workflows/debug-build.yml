name: debug-build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41'
          channel: 'stable'

      - uses: actions/cache@v5
        with:
          path: /home/runner/.pub-cache
          key: pub-${{ hashFiles('pubspec.lock') }}
          restore-keys: pub-

      - run: flutter pub get

      - run: dart run build_runner build --delete-conflicting-outputs

      - run: flutter analyze

      - run: flutter test

      - name: Build debug APKs (split by ABI)
        run: flutter build apk --debug --split-per-abi

      - name: Upload arm64-v8a debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-arm64-v8a-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-arm64-v8a-debug.apk

      - name: Upload armeabi-v7a debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-armeabi-v7a-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-armeabi-v7a-debug.apk

      - name: Upload x86_64 debug APK
        uses: actions/upload-artifact@v4
        with:
          name: pixelvibe-x86_64-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-x86_64-debug.apk
