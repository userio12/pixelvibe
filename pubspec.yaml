name: pixelvibe
description: "Material 3 Flutter video player powered by libmpv."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  cupertino_icons: ^1.0.9
  dio: ^5.9.2
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  flutter:
    sdk: flutter
  flutter_local_notifications: ^21.0.0
  flutter_riverpod: ^3.3.1
  freezed_annotation: ^3.1.0
  go_router: ^17.2.3
  intl: ^0.20.2
  json_annotation: ^4.12.0
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  path_provider: ^2.1.5
  permission_handler: ^12.0.1
  url_launcher: ^6.3.2

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^3.2.5
  json_serializable: ^6.14.0
  mocktail: ^1.0.5

flutter:
  uses-material-design: true
