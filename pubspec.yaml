name: pixelvibe
description: "Material 3 Flutter video player powered by libmpv."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  drift: ^2.33.0
  drift_flutter: ^0.3.0
  file_picker: ^8.0.0
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.3.1
  flutter_secure_storage: ^9.2.4
  go_router: ^17.2.3
  media_kit: ^1.2.6
  media_kit_libs_video: ^1.0.7
  media_kit_video: ^2.0.1
  path: ^1.9.1
  permission_handler: ^12.0.1
  shared_preferences: ^2.5.0

dev_dependencies:
  build_runner: ^2.15.0
  drift_dev: ^2.33.0
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
